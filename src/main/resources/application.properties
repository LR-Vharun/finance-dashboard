spring.application.name=finaceDashboard
spring.datasource.url=jdbc:mysql://localhost:3306/finance_db
spring.datasource.username=finance_user
spring.datasource.password=1234

# Tables are preserved across restarts (update = alter, not drop+create)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Suppress open-in-view warning
spring.jpa.open-in-view=false

# data.sql uses INSERT IGNORE with fixed IDs — safe to run every restart
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ── HikariCP connection retry ──────────────────────────────────────
# Wait up to 60s for MySQL to become available (instead of failing instantly)
spring.datasource.hikari.connection-timeout=60000
# Keep trying to get initial connection for 60s (-1 = indefinitely)
spring.datasource.hikari.initialization-fail-timeout=60000
# Retry failed connections every 30s
spring.datasource.hikari.keepalive-time=30000